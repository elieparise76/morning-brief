name: Morning Brief

on:
  schedule:
    # 7:30 AM ET = 11:30 UTC (EST) / 11:30 UTC (EDT is 7:30 AM = 11:30 UTC)
    # EST (UTC-5): 12:30 UTC | EDT (UTC-4): 11:30 UTC
    # Use 11:30 UTC to target 7:30 AM EDT (summer). Adjust to 12:30 for winter if needed.
    - cron: '30 11 * * 1-5'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  morning-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client requests python-dateutil pytz

      - name: Run morning brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GCAL_TOKEN_JSON: ${{ secrets.GCAL_TOKEN_JSON }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python morning_brief.py
