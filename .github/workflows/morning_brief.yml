name: Morning Brief

on:
  schedule:
    # Backup trigger (GitHub's own cron — unreliable, may run late or be skipped).
    # 7:30 AM EDT = 11:30 UTC (summer) / change to 12:30 UTC for EST (winter).
    # Runs 7 days a week now (weekend + Sunday editions are handled in the script).
    - cron: '30 11 * * *'
  repository_dispatch:
    # Primary trigger — fired by cron-job.org at exactly 7:30 AM ET.
    types: [morning-brief]
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  morning-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client requests python-dateutil pytz

      - name: Run morning brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GCAL_TOKEN_JSON: ${{ secrets.GCAL_TOKEN_JSON }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python morning_brief.py
